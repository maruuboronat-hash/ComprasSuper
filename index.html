<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Compras Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            padding: 20px;
            padding-bottom: 100px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            color: #1a1a2e;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.06);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-title h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #6D28D9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title .badge {
            background: #f3f0ff;
            color: #7C3AED;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            -webkit-text-fill-color: #7C3AED;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #1a1a2e;
            border: 1.5px solid #e5e7eb;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: #7C3AED;
            color: white;
            border-color: #7C3AED;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }

        .btn-primary:hover {
            background: #6D28D9;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
            transform: translateY(-2px);
        }

        .btn-outline {
            border-color: #e5e7eb;
        }

        .btn-outline:hover {
            background: #f8f9fa;
            border-color: #d1d5db;
        }

        .btn-success {
            background: #10b981;
            color: white;
            border-color: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }

        .categorias-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .categoria-wrapper {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .categoria-wrapper.dragging-cat {
            opacity: 0.3;
            transform: scale(0.95);
        }

        .categoria-wrapper.drag-over-cat {
            transform: scale(1.02);
            padding-top: 16px;
            border-top: 3px solid #7C3AED;
        }

        .categoria {
            background: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .categoria:hover {
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.06);
            border-color: rgba(124, 58, 237, 0.1);
        }

        .categoria-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
            gap: 12px;
            flex-wrap: wrap;
        }

        .categoria-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .cat-drag-handle {
            color: #c4b5d4;
            font-size: 18px;
            cursor: grab;
            display: none;
            user-select: none;
            padding: 4px;
            touch-action: none;
        }

        .cat-drag-handle.show {
            display: block;
        }

        .cat-icon {
            font-size: 22px;
            min-width: 32px;
            text-align: center;
        }

        .categoria-titulo {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a2e;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }

        .categoria-titulo-input {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a2e;
            border: 2px solid #7C3AED;
            border-radius: 8px;
            padding: 4px 10px;
            background: #faf8ff;
            outline: none;
            flex: 1;
            min-width: 80px;
            font-family: inherit;
        }

        .categoria-titulo-input:focus {
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .categoria-count {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }

        .categoria-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .cat-add-btn {
            background: #f3f0ff;
            color: #7C3AED;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            font-weight: 300;
        }

        .cat-add-btn.show {
            display: flex;
        }

        .cat-add-btn:hover {
            background: #7C3AED;
            color: white;
        }

        .cat-add-btn:active {
            transform: scale(0.9);
        }

        .cat-delete-btn {
            background: #fef2f2;
            color: #ef4444;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .cat-delete-btn.show {
            display: flex;
        }

        .cat-delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        .cat-delete-btn:active {
            transform: scale(0.9);
        }

        .items-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 9px 12px;
            border-radius: 10px;
            transition: all 0.2s;
            background: #faf8ff;
            gap: 12px;
            touch-action: none;
            border: 1px solid transparent;
        }

        .item:hover {
            background: #f5f3ff;
        }

        .item.dragging {
            opacity: 0.4;
            background: #ede9fe;
            transform: scale(0.98);
        }

        .item.drag-over {
            border-top: 3px solid #7C3AED;
            background: #ede9fe;
        }

        .item-checkbox {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border-radius: 6px;
            border: 2px solid #d1d5db;
            appearance: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            touch-action: manipulation;
            background: white;
        }

        .item-checkbox:checked {
            background: #7C3AED;
            border-color: #7C3AED;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .item-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 13px;
            font-weight: 700;
        }

        .item-checkbox:active {
            transform: scale(0.85);
        }

        .item-text {
            flex: 1;
            font-size: 15px;
            color: #1a1a2e;
            transition: all 0.3s;
            word-break: break-word;
            font-weight: 450;
        }

        .item-text.checked {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .item-drag-handle {
            color: #d1d5db;
            font-size: 16px;
            cursor: grab;
            display: none;
            user-select: none;
            padding: 2px;
            touch-action: none;
        }

        .item-drag-handle.show {
            display: block;
        }

        .item-drag-handle:hover {
            color: #7C3AED;
        }

        .item-delete {
            color: #fca5a5;
            font-size: 18px;
            cursor: pointer;
            display: none;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all 0.2s;
            touch-action: manipulation;
            font-weight: 300;
            background: transparent;
            border: none;
        }

        .item-delete.show {
            display: block;
        }

        .item-delete:hover {
            color: #ef4444;
            background: #fef2f2;
        }

        .item-delete:active {
            transform: scale(0.8);
        }

        .add-item-container {
            display: none;
            margin-top: 12px;
            gap: 10px;
            align-items: center;
            background: #faf8ff;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1.5px dashed #d1d5db;
        }

        .add-item-container.show {
            display: flex;
        }

        .add-item-input {
            flex: 1;
            padding: 8px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: white;
            font-family: inherit;
        }

        .add-item-input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
        }

        .add-item-confirm {
            background: #7C3AED;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
        }

        .add-item-confirm:hover {
            background: #6D28D9;
            transform: translateY(-1px);
        }

        .add-item-confirm:active {
            transform: scale(0.95);
        }

        .empty-message {
            text-align: center;
            color: #cbd5e1;
            padding: 16px;
            font-size: 14px;
            font-weight: 450;
        }

        .add-categoria-container {
            background: white;
            border-radius: 16px;
            padding: 18px;
            margin-top: 16px;
            border: 2px dashed #e5e7eb;
            transition: all 0.3s;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .add-categoria-container:focus-within {
            border-color: #7C3AED;
            background: #faf8ff;
        }

        .add-categoria-input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: white;
            font-family: inherit;
        }

        .add-categoria-input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
        }

        .add-categoria-select {
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: white;
            font-family: inherit;
            cursor: pointer;
            min-width: 120px;
        }

        .add-categoria-select:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
                padding-bottom: 80px;
            }

            .header {
                padding: 18px;
            }

            .header-title h1 {
                font-size: 20px;
            }

            .header-title .badge {
                font-size: 11px;
                padding: 3px 10px;
            }

            .btn {
                padding: 8px 14px;
                font-size: 13px;
            }

            .categoria {
                padding: 14px;
            }

            .categoria-titulo {
                font-size: 15px;
            }

            .item {
                padding: 7px 10px;
            }

            .item-text {
                font-size: 14px;
            }

            .add-categoria-container {
                padding: 14px;
                flex-direction: column;
            }

            .add-categoria-input,
            .add-categoria-select {
                width: 100%;
                min-width: unset;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .categoria-wrapper {
            animation: fadeInUp 0.3s ease-out;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <div class="header-title">
                <h1>🛒 Lista de Compras</h1>
                <span class="badge" id="totalItems">0 items</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" id="resetBtn">🔄 Reiniciar</button>
                <button class="btn btn-primary" id="editBtn">✏️ Editar</button>
            </div>
        </div>
    </div>

    <div class="categorias-container" id="listaContainer"></div>

    <div class="add-categoria-container" id="addCategoriaContainer">
        <input type="text" class="add-categoria-input" id="addCategoriaInput" placeholder="Nueva categoría...">
        <select class="add-categoria-select" id="addCategoriaIcon">
            <option value="🛒">🛒 General</option>
            <option value="🥬">🥬 Verduras</option>
            <option value="🧀">🧀 Lácteos</option>
            <option value="🥫">🥫 Almacén</option>
            <option value="🍞">🍞 Panadería</option>
            <option value="🥩">🥩 Carnes</option>
            <option value="❄️">❄️ Congelados</option>
            <option value="☕">☕ Desayuno</option>
            <option value="🧹">🧹 Limpieza</option>
            <option value="🧴">🧴 Higiene</option>
            <option value="🥤">🥤 Bebidas</option>
            <option value="🍕">🍕 Comida</option>
            <option value="🧁">🧁 Dulces</option>
            <option value="🌿">🌿 Salud</option>
        </select>
        <button class="btn btn-success" id="addCategoriaBtn">Agregar</button>
    </div>

    <script>
        // ============================================================
        // DATOS INICIALES
        // ============================================================
        const categoriasData = [
            { id: 'verduleria', icon: '🥬', nombre: 'Verdulería', items: ['Bananas', 'Manzanas', 'Naranjas', 'Limones', 'Tomates', 'Lechuga', 'Zanahorias', 'Cebollas', 'Papas', 'Batatas', 'Palta'] },
            { id: 'lacteos', icon: '🧀', nombre: 'Lácteos', items: ['Leche', 'Yogur', 'Queso cremoso', 'Queso rallado', 'Manteca', 'Huevos'] },
            { id: 'almacen', icon: '🥫', nombre: 'Almacén', items: ['Arroz', 'Fideos', 'Puré de tomate', 'Atún', 'Lentejas', 'Garbanzos', 'Aceite', 'Vinagre', 'Sal', 'Azúcar', 'Harina', 'Pan rallado'] },
            { id: 'panaderia', icon: '🍞', nombre: 'Panadería', items: ['Pan de molde', 'Pan francés', 'Tostadas'] },
            { id: 'carnes', icon: '🥩', nombre: 'Carnes', items: ['Pollo', 'Carne picada', 'Milanesas', 'Pescado'] },
            { id: 'congelados', icon: '❄️', nombre: 'Congelados', items: ['Verduras congeladas', 'Hamburguesas', 'Helado'] },
            { id: 'desayuno', icon: '☕', nombre: 'Desayuno y merienda', items: ['Café', 'Té', 'Galletitas', 'Mermelada', 'Dulce de leche', 'Cereales'] },
            { id: 'limpieza', icon: '🧹', nombre: 'Limpieza', items: ['Detergente', 'Esponja', 'Lavandina', 'Limpiador de pisos', 'Bolsas de residuos', 'Papel de cocina'] },
            { id: 'higiene', icon: '🧴', nombre: 'Higiene personal', items: ['Papel higiénico', 'Shampoo', 'Acondicionador', 'Jabón', 'Pasta dental', 'Desodorante'] },
            { id: 'bebidas', icon: '🥤', nombre: 'Bebidas', items: ['Agua', 'Gaseosas', 'Jugo', 'Cerveza', 'Vino'] }
        ];

        // ============================================================
        // ESTADO
        // ============================================================
        let categories = [];
        let data = {};
        let editMode = false;
        let dragData = null;
        let dragOverData = null;
        let catDragData = null;
        let catDragOverData = null;

        function loadData() {
            const saved = localStorage.getItem('listaComprasPro');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.categories && parsed.data) {
                        categories = parsed.categories;
                        data = parsed.data;
                        // Asegurar items iniciales
                        categories.forEach(cat => {
                            if (!data[cat.id]) {
                                data[cat.id] = cat.items.map(item => ({ text: item, checked: false }));
                            } else {
                                const existingTexts = data[cat.id].map(i => i.text);
                                cat.items.forEach(item => {
                                    if (!existingTexts.includes(item)) {
                                        data[cat.id].push({ text: item, checked: false });
                                    }
                                });
                            }
                        });
                        saveData();
                        return;
                    }
                } catch (e) { console.warn('Error al cargar datos'); }
            }
            categories = JSON.parse(JSON.stringify(categoriasData));
            data = {};
            categories.forEach(cat => {
                data[cat.id] = cat.items.map(item => ({ text: item, checked: false }));
            });
            saveData();
        }

        function saveData() {
            localStorage.setItem('listaComprasPro', JSON.stringify({ categories, data }));
            updateTotalCount();
        }

        function updateTotalCount() {
            let total = 0;
            Object.values(data).forEach(items => { total += items.length; });
            document.getElementById('totalItems').textContent = total + ' items';
        }

        // ============================================================
        // RENDER
        // ============================================================
        function render() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = '';

            categories.forEach((cat, catIndex) => {
                const items = data[cat.id] || [];

                const wrapper = document.createElement('div');
                wrapper.className = 'categoria-wrapper';
                wrapper.dataset.categoriaId = cat.id;
                wrapper.draggable = editMode;

                const div = document.createElement('div');
                div.className = 'categoria';
                if (editMode) div.classList.add('edit-mode');

                div.innerHTML = `
                    <div class="categoria-header">
                        <div class="categoria-header-left">
                            <span class="cat-drag-handle ${editMode ? 'show' : ''}">⠿</span>
                            <span class="cat-icon">${cat.icon}</span>
                            ${editMode ? 
                                `<input type="text" class="categoria-titulo-input" value="${cat.nombre}" data-categoria-id="${cat.id}" placeholder="Nombre...">` :
                                `<span class="categoria-titulo">${cat.nombre}</span>`
                            }
                            <span class="categoria-count">${items.length}</span>
                        </div>
                        <div class="categoria-actions">
                            <button class="cat-add-btn ${editMode ? 'show' : ''}" data-categoria-id="${cat.id}">+</button>
                            <button class="cat-delete-btn ${editMode ? 'show' : ''}" data-categoria-id="${cat.id}">✕</button>
                        </div>
                    </div>
                    <div class="items-container" data-categoria-id="${cat.id}">
                        ${items.length === 0 ? '<div class="empty-message">Sin items</div>' : ''}
                        ${items.map((item, index) => `
                            <div class="item" data-categoria-id="${cat.id}" data-index="${index}" draggable="${editMode}">
                                <span class="item-drag-handle ${editMode ? 'show' : ''}">⠿</span>
                                <input type="checkbox" class="item-checkbox" ${item.checked ? 'checked' : ''} data-categoria-id="${cat.id}" data-index="${index}">
                                <span class="item-text ${item.checked ? 'checked' : ''}">${item.text}</span>
                                <button class="item-delete ${editMode ? 'show' : ''}" data-categoria-id="${cat.id}" data-index="${index}">✕</button>
                            </div>
                        `).join('')}
                    </div>
                    <div class="add-item-container ${editMode ? 'show' : ''}" data-categoria-id="${cat.id}">
                        <input type="text" class="add-item-input" placeholder="Nuevo item...">
                        <button class="add-item-confirm" data-categoria-id="${cat.id}">Agregar</button>
                    </div>
                `;

                wrapper.appendChild(div);
                container.appendChild(wrapper);
            });

            attachEvents();
            updateTotalCount();
        }

        // ============================================================
        // EVENTOS
        // ============================================================
        function attachEvents() {
            // Checkboxes
            document.querySelectorAll('.item-checkbox').forEach(cb => {
                cb.removeEventListener('change', handleCheckboxChange);
                cb.addEventListener('change', handleCheckboxChange);
            });

            // Eliminar items
            document.querySelectorAll('.item-delete').forEach(btn => {
                btn.removeEventListener('click', handleItemDelete);
                btn.addEventListener('click', handleItemDelete);
            });

            // Agregar items
            document.querySelectorAll('.cat-add-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddBtnClick);
                btn.addEventListener('click', handleAddBtnClick);
            });

            document.querySelectorAll('.add-item-confirm').forEach(btn => {
                btn.removeEventListener('click', handleAddConfirm);
                btn.addEventListener('click', handleAddConfirm);
            });

            document.querySelectorAll('.add-item-input').forEach(input => {
                input.removeEventListener('keydown', handleAddInputKeydown);
                input.addEventListener('keydown', handleAddInputKeydown);
            });

            // Editar nombre categoría
            document.querySelectorAll('.categoria-titulo-input').forEach(input => {
                input.removeEventListener('change', handleCategoryNameChange);
                input.addEventListener('change', handleCategoryNameChange);
                input.removeEventListener('blur', handleCategoryNameChange);
                input.addEventListener('blur', handleCategoryNameChange);
            });

            // Eliminar categoría
            document.querySelectorAll('.cat-delete-btn').forEach(btn => {
                btn.removeEventListener('click', handleCategoryDelete);
                btn.addEventListener('click', handleCategoryDelete);
            });

            // Drag & Drop items
            if (editMode) {
                document.querySelectorAll('.item').forEach(item => {
                    item.removeEventListener('dragstart', handleDragStart);
                    item.removeEventListener('dragend', handleDragEnd);
                    item.removeEventListener('dragover', handleDragOver);
                    item.removeEventListener('dragleave', handleDragLeave);
                    item.removeEventListener('drop', handleDrop);
                    item.addEventListener('dragstart', handleDragStart);
                    item.addEventListener('dragend', handleDragEnd);
                    item.addEventListener('dragover', handleDragOver);
                    item.addEventListener('dragleave', handleDragLeave);
                    item.addEventListener('drop', handleDrop);
                });

                // Drag & Drop categorías
                document.querySelectorAll('.categoria-wrapper').forEach(wrapper => {
                    wrapper.removeEventListener('dragstart', handleCatDragStart);
                    wrapper.removeEventListener('dragend', handleCatDragEnd);
                    wrapper.removeEventListener('dragover', handleCatDragOver);
                    wrapper.removeEventListener('dragleave', handleCatDragLeave);
                    wrapper.removeEventListener('drop', handleCatDrop);
                    wrapper.addEventListener('dragstart', handleCatDragStart);
                    wrapper.addEventListener('dragend', handleCatDragEnd);
                    wrapper.addEventListener('dragover', handleCatDragOver);
                    wrapper.addEventListener('dragleave', handleCatDragLeave);
                    wrapper.addEventListener('drop', handleCatDrop);
                });
            }

            // Botones principales
            document.getElementById('resetBtn').removeEventListener('click', handleReset);
            document.getElementById('resetBtn').addEventListener('click', handleReset);

            document.getElementById('editBtn').removeEventListener('click', handleEditToggle);
            document.getElementById('editBtn').addEventListener('click', handleEditToggle);

            document.getElementById('addCategoriaBtn').removeEventListener('click', handleAddCategory);
            document.getElementById('addCategoriaBtn').addEventListener('click', handleAddCategory);

            document.getElementById('addCategoriaInput').removeEventListener('keydown', handleAddCategoryKeydown);
            document.getElementById('addCategoriaInput').addEventListener('keydown', handleAddCategoryKeydown);
        }

        // ============================================================
        // HANDLERS - ITEMS
        // ============================================================
        function handleCheckboxChange(e) {
            const catId = e.target.dataset.categoriaId;
            const index = parseInt(e.target.dataset.index);
            if (data[catId] && data[catId][index]) {
                data[catId][index].checked = e.target.checked;
                saveData();
                const textSpan = e.target.closest('.item').querySelector('.item-text');
                if (textSpan) {
                    textSpan.classList.toggle('checked', e.target.checked);
                }
                updateTotalCount();
            }
        }

        function handleItemDelete(e) {
            if (!editMode) return;
            const catId = e.target.dataset.categoriaId;
            const index = parseInt(e.target.dataset.index);
            if (data[catId]) {
                data[catId].splice(index, 1);
                saveData();
                render();
            }
        }

        function handleAddBtnClick(e) {
            const catId = e.target.dataset.categoriaId;
            const container = e.target.closest('.categoria').querySelector('.add-item-container');
            const input = container.querySelector('.add-item-input');
            container.classList.toggle('show');
            if (container.classList.contains('show')) {
                input.focus();
            }
        }

        function handleAddConfirm(e) {
            const catId = e.target.dataset.categoriaId;
            const container = e.target.closest('.categoria').querySelector('.add-item-container');
            const input = container.querySelector('.add-item-input');
            const text = input.value.trim();
            if (text && data[catId]) {
                data[catId].push({ text: text, checked: false });
                saveData();
                render();
                setTimeout(() => {
                    const newInput = container.querySelector('.add-item-input');
                    if (newInput) {
                        newInput.value = '';
                        newInput.focus();
                    }
                }, 50);
            }
        }

        function handleAddInputKeydown(e) {
            if (e.key === 'Enter') {
                const btn = e.target.closest('.categoria').querySelector('.add-item-confirm');
                if (btn) btn.click();
            }
        }

        // ============================================================
        // HANDLERS - CATEGORÍAS
        // ============================================================
        function handleCategoryNameChange(e) {
            const catId = e.target.dataset.categoriaId;
            const newName = e.target.value.trim();
            if (newName) {
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    cat.nombre = newName;
                    saveData();
                    render();
                }
            }
        }

        function handleCategoryDelete(e) {
            if (!editMode) return;
            const catId = e.target.dataset.categoriaId;
            if (categories.length <= 1) {
                alert('Debe haber al menos una categoría');
                return;
            }
            if (confirm(`¿Eliminar la categoría "${getCategoryName(catId)}" y todos sus items?`)) {
                const index = categories.findIndex(c => c.id === catId);
                if (index !== -1) {
                    categories.splice(index, 1);
                    delete data[catId];
                    saveData();
                    render();
                }
            }
        }

        function handleAddCategory() {
            const input = document.getElementById('addCategoriaInput');
            const select = document.getElementById('addCategoriaIcon');
            const name = input.value.trim();
            const icon = select.value;
            if (!name) {
                alert('Ingresa un nombre para la categoría');
                return;
            }
            const id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (categories.find(c => c.id === id)) {
                alert('Ya existe una categoría con ese nombre');
                return;
            }
            categories.push({ id, icon, nombre: name, items: [] });
            data[id] = [];
            saveData();
            render();
            input.value = '';
            input.focus();
        }

        function handleAddCategoryKeydown(e) {
            if (e.key === 'Enter') {
                document.getElementById('addCategoriaBtn').click();
            }
        }
