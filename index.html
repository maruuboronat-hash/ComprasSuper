<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Compras Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            padding: 20px;
            padding-bottom: 100px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            color: #1a1a2e;
        }

        /* HEADER */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.06);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-title h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #6D28D9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title .badge {
            background: #f3f0ff;
            color: #7C3AED;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            -webkit-text-fill-color: #7C3AED;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #1a1a2e;
            border: 1.5px solid #e5e7eb;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: #7C3AED;
            color: white;
            border-color: #7C3AED;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }

        .btn-primary:hover {
            background: #6D28D9;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: scale(0.95) translateY(0);
        }

        .btn-outline {
            border-color: #e5e7eb;
        }

        .btn-outline:hover {
            background: #f8f9fa;
            border-color: #d1d5db;
        }

        .btn-danger-outline {
            border-color: #fecaca;
            color: #dc2626;
        }

        .btn-danger-outline:hover {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .btn-success {
            background: #10b981;
            color: white;
            border-color: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 18px;
        }

        /* CATEGORÍAS */
        .categorias-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .categoria-wrapper {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .categoria-wrapper.dragging-cat {
            opacity: 0.3;
            transform: scale(0.95);
        }

        .categoria-wrapper.drag-over-cat {
            transform: scale(1.02);
            padding-top: 16px;
            border-top: 3px solid #7C3AED;
        }

        .categoria {
            background: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .categoria:hover {
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.06);
            border-color: rgba(124, 58, 237, 0.1);
        }

        .categoria-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
            gap: 12px;
            flex-wrap: wrap;
        }

        .categoria-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .cat-drag-handle {
            color: #c4b5d4;
            font-size: 18px;
            cursor: grab;
            display: none;
            user-select: none;
            padding: 4px;
            touch-action: none;
            transition: color 0.2s;
        }

        .cat-drag-handle:hover {
            color: #7C3AED;
        }

        .cat-drag-handle.show {
            display: block;
        }

        .cat-icon {
            width: 32px;
            height: 32px;
            min-width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f0ff;
            border-radius: 8px;
            color: #7C3AED;
        }

        .cat-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .categoria-titulo {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a2e;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }

        .categoria-titulo-input {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a2e;
            border: 2px solid #7C3AED;
            border-radius: 8px;
            padding: 4px 10px;
            background: #faf8ff;
            outline: none;
            flex: 1;
            min-width: 80px;
            font-family: inherit;
        }

        .categoria-titulo-input:focus {
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .categoria-count {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }

        .categoria-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .cat-add-btn {
            background: #f3f0ff;
            color: #7C3AED;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            font-weight: 300;
        }

        .cat-add-btn.show {
            display: flex;
        }

        .cat-add-btn:hover {
            background: #7C3AED;
            color: white;
        }

        .cat-add-btn:active {
            transform: scale(0.9);
        }

        .cat-delete-btn {
            background: #fef2f2;
            color: #ef4444;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .cat-delete-btn.show {
            display: flex;
        }

        .cat-delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        .cat-delete-btn:active {
            transform: scale(0.9);
        }

        /* ITEMS */
        .items-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 9px 12px;
            border-radius: 10px;
            transition: all 0.2s;
            background: #faf8ff;
            gap: 12px;
            touch-action: none;
            border: 1px solid transparent;
        }

        .item:hover {
            background: #f5f3ff;
        }

        .item.dragging {
            opacity: 0.4;
            background: #ede9fe;
            transform: scale(0.98);
        }

        .item.drag-over {
            border-top: 3px solid #7C3AED;
            background: #ede9fe;
        }

        .item-checkbox {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border-radius: 6px;
            border: 2px solid #d1d5db;
            appearance: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            touch-action: manipulation;
            background: white;
        }

        .item-checkbox:checked {
            background: #7C3AED;
            border-color: #7C3AED;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .item-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 13px;
            font-weight: 700;
        }

        .item-checkbox:active {
            transform: scale(0.85);
        }

        .item-text {
            flex: 1;
            font-size: 15px;
            color: #1a1a2e;
            transition: all 0.3s;
            word-break: break-word;
            font-weight: 450;
        }

        .item-text.checked {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .item-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .item-delete {
            color: #fca5a5;
            font-size: 18px;
            cursor: pointer;
            display: none;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all 0.2s;
            touch-action: manipulation;
            font-weight: 300;
            background: transparent;
            border: none;
        }

        .item-delete.show {
            display: block;
        }

        .item-delete:hover {
            color: #ef4444;
            background: #fef2f2;
        }

        .item-delete:active {
            transform: scale(0.8);
        }

        .item-drag-handle {
            color: #d1d5db;
            font-size: 16px;
            cursor: grab;
            display: none;
            user-select: none;
            padding: 2px;
            touch-action: none;
            transition: color 0.2s;
        }

        .item-drag-handle.show {
            display: block;
        }

        .item-drag-handle:hover {
            color: #7C3AED;
        }

        /* AGREGAR ITEM */
        .add-item-container {
            display: none;
            margin-top: 12px;
            gap: 10px;
            align-items: center;
            background: #faf8ff;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1.5px dashed #d1d5db;
        }

        .add-item-container.show {
            display: flex;
        }

        .add-item-input {
            flex: 1;
            padding: 8px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: white;
            font-family: inherit;
        }

        .add-item-input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
        }

        .add-item-confirm {
            background: #7C3AED;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
        }

        .add-item-confirm:hover {
            background: #6D28D9;
            transform: translateY(-1px);
        }

        .add-item-confirm:active {
            transform: scale(0.95);
        }

        .empty-message {
            text-align: center;
            color: #cbd5e1;
            padding: 16px;
            font-size: 14px;
            font-weight: 450;
        }

        /* AGREGAR CATEGORÍA */
        .add-categoria-container {
            background: white;
            border-radius: 16px;
            padding: 18px;
            margin-top: 16px;
            border: 2px dashed #e5e7eb;
            transition: all 0.3s;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .add-categoria-container:focus-within {
            border-color: #7C3AED;
            background: #faf8ff;
        }

        .add-categoria-input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: white;
            font-family: inherit;
        }

        .add-categoria-input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
        }

        .add-categoria-select {
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: white;
            font-family: inherit;
            cursor: pointer;
            min-width: 120px;
        }

        .add-categoria-select:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 12px;
                padding-bottom: 80px;
            }

            .header {
                padding: 18px;
            }

            .header-title h1 {
                font-size: 20px;
            }

            .header-title .badge {
                font-size: 11px;
                padding: 3px 10px;
            }

            .btn {
                padding: 8px 14px;
                font-size: 13px;
            }

            .categoria {
                padding: 14px;
            }

            .categoria-titulo {
                font-size: 15px;
            }

            .item {
                padding: 7px 10px;
            }

            .item-text {
                font-size: 14px;
            }

            .add-categoria-container {
                padding: 14px;
                flex-direction: column;
            }

            .add-categoria-input,
            .add-categoria-select {
                width: 100%;
                min-width: unset;
            }
        }

        /* Scroll suave */
        .categorias-container {
            scroll-behavior: smooth;
        }

        /* Animación de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .categoria-wrapper {
            animation: fadeInUp 0.3s ease-out;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <div class="header-title">
                <h1>🛒 Lista de Compras</h1>
                <span class="badge" id="totalItems">0 items</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" id="resetBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    Reiniciar
                </button>
                <button class="btn btn-primary" id="editBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Editar
                </button>
            </div>
        </div>
    </div>

    <div class="categorias-container" id="listaContainer"></div>

    <div class="add-categoria-container" id="addCategoriaContainer">
        <input type="text" class="add-categoria-input" id="addCategoriaInput" placeholder="Nueva categoría...">
        <select class="add-categoria-select" id="addCategoriaIcon">
            <option value="🛒">🛒 General</option>
            <option value="🥬">🥬 Verduras</option>
            <option value="🧀">🧀 Lácteos</option>
            <option value="🥫">🥫 Almacén</option>
            <option value="🍞">🍞 Panadería</option>
            <option value="🥩">🥩 Carnes</option>
            <option value="❄️">❄️ Congelados</option>
            <option value="☕">☕ Desayuno</option>
            <option value="🧹">🧹 Limpieza</option>
            <option value="🧴">🧴 Higiene</option>
            <option value="🥤">🥤 Bebidas</option>
            <option value="🍕">🍕 Comida</option>
            <option value="🧁">🧁 Dulces</option>
            <option value="🌿">🌿 Salud</option>
        </select>
        <button class="btn btn-success" id="addCategoriaBtn">Agregar</button>
    </div>

    <script>
        // ============================================================
        // ICONOS SVG POR CATEGORÍA
        // ============================================================
        const iconMap = {
            '🥬': 'leaf',
            '🧀': 'cheese',
            '🥫': 'package',
            '🍞': 'bread',
            '🥩': 'meat',
            '❄️': 'snowflake',
            '☕': 'coffee',
            '🧹': 'broom',
            '🧴': 'bottle',
            '🥤': 'drink',
            '🛒': 'shopping-cart',
            '🍕': 'pizza',
            '🧁': 'cake',
            '🌿': 'leaf'
        };

        function getIconSVG(emoji) {
            const iconName = iconMap[emoji] || 'shopping-cart';
            const svgs = {
                'leaf': `<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>`,
                'cheese': `<path d="M4 7.5L12 4l8 3.5L12 11 4 7.5z"/><path d="M4 7.5v8.5l8 3.5 8-3.5V7.5"/><path d="M12 11v8.5"/>`,
                'package': `<path d="M4 7l8 4 8-4"/><path d="M4 7v9l8 4 8-4V7"/><path d="M12 11v9"/>`,
                'bread': `<path d="M12 4a8 8 0 0 0-8 8c0 3.314 2.686 6 6 6h4c3.314 0 6-2.686 6-6a8 8 0 0 0-8-8z"/><path d="M8 12h8"/>`,
                'meat': `<path d="M18 6a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V6z"/><path d="M9 6h6"/><path d="M9 10h6"/><path d="M9 14h4"/>`,
                'snowflake': `<path d="M12 2v20"/><path d="M12 4L9 7"/><path d="M12 4l3 3"/><path d="M12 20l-3-3"/><path d="M12 20l3-3"/><path d="M4 12h16"/><path d="M4 12l3-3"/><path d="M4 12l3 3"/><path d="M20 12l-3-3"/><path d="M20 12l-3 3"/>`,
                'coffee': `<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><path d="M6 2v3"/><path d="M10 2v3"/><path d="M14 2v3"/>`,
                'broom': `<path d="M3 21l7-7"/><path d="M10 14l5-5"/><path d="M15 9l3-3"/><path d="M18 6l3-3"/><path d="M5 19l4-4"/><path d="M9 15l2-2"/>`,
                'bottle': `<path d="M12 2v4"/><path d="M9 6h6"/><path d="M9 6a5 5 0 0 0-5 5v5a5 5 0 0 0 5 5h6a5 5 0 0 0 5-5v-5a5 5 0 0 0-5-5"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h2"/>`,
                'drink': `<path d="M8 7h8"/><path d="M8 7l-1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l-1-12"/><path d="M12 7V3"/>`,
                'shopping-cart': `<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>`,
                'pizza': `<circle cx="12" cy="12" r="10"/><circle cx="9" cy="9" r="1.5"/><circle cx="15" cy="9" r="1.5"/><circle cx="12" cy="15" r="2"/>`,
                'cake': `<path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h8"/>`
            };
            const svgContent = svgs[iconName] || svgs['shopping-cart'];
            return `<svg viewBox="0 0 24 24">${svgContent}</svg>`;
        }

        // ============================================================
        // DATOS INICIALES
        // ============================================================
        const categoriasData = [
            { id: 'verduleria', icon: '🥬', nombre: 'Verdulería', items: ['Bananas', 'Manzanas', 'Naranjas', 'Limones', 'Tomates', 'Lechuga', 'Zanahorias', 'Cebollas', 'Papas', 'Batatas', 'Palta'] },
            { id: 'lacteos', icon: '🧀', nombre: 'Lácteos', items: ['Leche', 'Yogur', 'Queso cremoso', 'Queso rallado', 'Manteca', 'Huevos'] },
            { id: 'almacen', icon: '🥫', nombre: 'Almacén', items: ['Arroz', 'Fideos', 'Puré de tomate', 'Atún', 'Lentejas', 'Garbanzos', 'Aceite', 'Vinagre', 'Sal', 'Azúcar', 'Harina', 'Pan rallado'] },
            { id: 'panaderia', icon: '🍞', nombre: 'Panadería', items: ['Pan de molde', 'Pan francés', 'Tostadas'] },
            { id: 'carnes', icon: '🥩', nombre: 'Carnes', items: ['Pollo', 'Carne picada', 'Milanesas', 'Pescado'] },

        // Cargar desde localStorage
        function loadData() {
            const saved = localStorage.getItem('listaComprasPro');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.categories && parsed.data) {
                        categories = parsed.categories;
                        data = parsed.data;
                        // Asegurar que todas las categorías tengan data
                        categories.forEach(cat => {
                            if (!data[cat.id]) {
                                data[cat.id] = cat.items.map(item => ({ text: item, checked: false }));
                            } else {
                                // Verificar items iniciales
                                const existingTexts = data[cat.id].map(i => i.text);
                                cat.items.forEach(item => {
                                    if (!existingTexts.includes(item)) {
                                        data[cat.id].push({ text: item, checked: false });
                                    }
                                });
                            }
                        });
                        saveData();
                        return;
                    }
                } catch (e) {
                    console.warn('Error al cargar datos, usando datos iniciales');

            saveData();

            localStorage.setItem('listaComprasPro', JSON.stringify({ categories, data }));
